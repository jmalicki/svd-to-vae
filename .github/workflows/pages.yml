name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm test
      # Bake artifacts + measured-ablation gates (same as prebuild; run once here
      # for clear CI logs). gen:ringing and gen:freeze fail the build if any
      # documented optimizer failure mode stops reproducing.
      - run: npm run gen:ringing
      - run: npm run gen:freeze
      - run: npm run gen:imm-pack
      - name: Build site
        run: npx tsc --noEmit && npx vite build
        env:
          # One repo, two Pages sites. The same commit is pushed to both
          # jmalicki/svd-to-vae (six-chapter tour) and jmalicki/svd-grad
          # (standalone gradient-descent demo); the repo this workflow runs
          # in selects the variant and base path.
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_SITE: ${{ github.event.repository.name == 'svd-grad' && 'grad' || 'tour' }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
